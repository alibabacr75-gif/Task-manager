{% extends 'base.html' %}

{% block title %}Task Details{% endblock %}

{% block content %}
    <h1>Task Details</h1>
    <dl style="margin-bottom: 1rem;">
        <dt style="font-weight: bold;">Title</dt>
        <dd>{{ task.title }}</dd>
        <dt style="font-weight: bold;">Status</dt>
        <dd>{% if task.done %}Completed{% else %}Open{% endif %}</dd>
        <dt style="font-weight: bold;">Created</dt>
        <dd>{{ task.created|date:'F j, Y H:i' }}</dd>
    </dl>
    <p>
        <a href="{% url 'edit' task.pk %}" style="margin-right: 1rem;">Edit</a>
        <a href="{% url 'delete' task.pk %}" style="margin-right: 1rem;">Delete</a>
        <a href="{% url 'list' %}">Back to list</a>
    </p>
{% endblock %}
