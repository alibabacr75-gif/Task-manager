{% extends 'base.html' %}

{% block title %}Edit Task{% endblock %}

{% block content %}
    <h1>Edit Task</h1>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" style="padding: 0.6rem 1rem; background: #0d6efd; color: white; border: none; cursor: pointer;">Save Changes</button>
    </form>
    <p><a href="{% url 'list' %}">Back to list</a></p>
{% endblock %}
