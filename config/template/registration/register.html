{% extends 'base.html' %}

{% block title %}Register{% endblock %}

{% block content %}
    <h1>Register</h1>
    <form method="POST" style="text-align: left; max-width: 300px; margin: 1rem auto;">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" style="padding: 0.5rem; width: 100%; margin: 1rem 0;">Create account</button>
    </form>
    <p>Already have an account? <a href="{% url 'login' %}">Login here</a>.</p>
{% endblock %}
