<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Task Manager{% endblock %}</title>
</head>
<body style="font-family: system-ui; max-width: 900px; margin: 0 auto; padding: 1rem; background: #f9fafb; color: #111;">
    <header style="display: flex; justify-content: space-between; align-items: center; padding: 1rem 0; border-bottom: 1px solid #ddd; margin-bottom: 1.5rem;">
        <div>
            <a href="{% url 'list' %}" style="font-weight: bold; color: #0d6efd; text-decoration: none; font-size: 1.2rem;">Task Manager</a>
        </div>
        <nav style="display: flex; gap: 1rem; font-size: 0.95rem; align-items: center;">
            {% if request.user.is_authenticated %}
                <span style="color: #555;">Signed in as {{ request.user.username }}</span>
                <a href="{% url 'list' %}" style="color: #0d6efd; text-decoration: none;">My Tasks</a>
                <a href="{% url 'add' %}" style="color: #0d6efd; text-decoration: none;">Add Task</a>
                <form method="POST" action="{% url 'logout' %}" style="display: inline; margin: 0;">
                    {% csrf_token %}
                    <button type="submit" style="background: transparent; border: 1px solid #0d6efd; color: #0d6efd; padding: 0.35rem 0.8rem; border-radius: 4px; cursor: pointer;">Logout</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}" style="color: #0d6efd; text-decoration: none;">Login</a>
                <a href="{% url 'register' %}" style="color: #0d6efd; text-decoration: none;">Register</a>
            {% endif %}
        </nav>
    </header>

    <main style="background: white; padding: 1.5rem; border-radius: 12px; box-shadow: 0 1px 8px rgba(0,0,0,0.05);">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
